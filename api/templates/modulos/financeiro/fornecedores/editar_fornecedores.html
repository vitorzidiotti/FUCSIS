{% extends "base.html" %}

{% block title %}Editar Fornecedor - FUCSIS{% endblock %}

{% block content %}
<div class="auth-container" style="margin-top: 2rem; max-width: 500px;">
    <h1>Editar Fornecedor</h1>
    
    <form method="POST" action="{{ url_for('editar_fornecedor', id_fornecedor=fornecedor.id_fornecedor) }}">
        <div class="form-group">
            <label>Nome Fantasia:</label>
            <input type="text" name="nome_fantasia" value="{{ fornecedor.nome_fantasia }}" required>
        </div>

        <div class="form-group">
            <label>CNPJ:</label>
            <input type="text" name="cnpj" value="{{ fornecedor.cnpj }}">
        </div>

        <div class="form-group">
            <label>Contato:</label>
            <input type="text" name="contato_nome" value="{{ fornecedor.contato_nome }}">
        </div>

        <div class="form-group">
            <label>E-mail:</label>
            <input type="email" name="contato_email" value="{{ fornecedor.contato_email }}">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-green">Salvar Alterações</button>
            <a href="{{ back_url }}" class="btn btn-yellow">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
