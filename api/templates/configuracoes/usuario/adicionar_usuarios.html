{% extends "base.html" %}

{% block title %}Adicionar Usuário{% endblock %}

{% block content %}
<div class="auth-container" style="margin-top: 2rem;">
    <h1>Novo Usuário</h1>
    
    <form method="POST" action="{{ url_for('adicionar_usuario') }}">
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
        </div>

        <div class="form-group">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required maxlength="14">
        </div>
        
        <div class="form-group">
            <label for="id_grupo">Grupo / Permissão:</label>
            <select name="id_grupo" id="id_grupo" required>
                <option value="" disabled selected>Selecione um nível...</option>
                {% for grupo in grupos %}
                    <option value="{{ grupo.id_grupo }}">{{ grupo.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="senha">Senha de Acesso:</label>
            <input type="password" id="senha" name="senha" required>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-green" style="width: 100%; padding: 14px;">Criar Conta</button>
            <a href="{{ url_for('gerenciar_usuarios') }}" class="btn btn-yellow" style="width: 100%; padding: 14px;">Cancelar</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const cpfInput = document.getElementById("cpf");
        function formatarCPF(cpf) {
            let value = String(cpf).replace(/\D/g, "");
            value = value.substring(0, 11);
            if (value.length > 9) return value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            if (value.length > 6) return value.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
            if (value.length > 3) return value.replace(/(\d{3})(\d{1,3})/, "$1.$2");
            return value;
        }
        if (cpfInput) {
            cpfInput.addEventListener("input", (e) => e.target.value = formatarCPF(e.target.value));
        }
    });
</script>
{% endblock %}
