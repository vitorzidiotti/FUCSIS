{% extends "base.html" %}

{% block title %}Editar Usuário{% endblock %}

{% block content %}
<div class="auth-container" style="margin-top: 2rem;">
    <h1>Editar Usuário</h1>
    
    <form method="POST" action="{{ url_for('editar_usuario', id_usuario=usuario.id_usuario) }}">
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" value="{{ usuario.nome }}" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ usuario.email }}" required>
        </div>

        <div class="form-group">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" value="{{ usuario.cpf }}" required maxlength="14">
        </div>
        
        <div class="form-group">
            <label for="id_grupo">Grupo / Permissão de Acesso:</label>
            <select name="id_grupo" id="id_grupo" required>
                {% for grupo in grupos %}
                    <option value="{{ grupo.id_grupo }}" {% if grupo.id_grupo == usuario.id_grupo %}selected{% endif %}>
                        {{ grupo.nome }}
                    </option>
                {% endfor %}
            </select>
            <small style="color: #666;">Isso define o que o usuário pode ver no sistema.</small>
        </div>

        <div class="form-group">
            <label for="senha">Nova Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Deixe em branco para manter a atual">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-green" style="width: 100%; padding: 14px;">Salvar Alterações</button>
            <a href="{{ url_for('gerenciar_usuarios') }}" class="btn btn-yellow" style="width: 100%; padding: 14px;">Cancelar</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const cpfInput = document.getElementById("cpf");

        function formatarCPF(cpf) {
            let value = String(cpf).replace(/\D/g, "");
            value = value.substring(0, 11);
            if (value.length > 9) return value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            if (value.length > 6) return value.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
            if (value.length > 3) return value.replace(/(\d{3})(\d{1,3})/, "$1.$2");
            return value;
        }

        if (cpfInput) {
            cpfInput.value = formatarCPF(cpfInput.value);
            cpfInput.addEventListener("input", (e) => e.target.value = formatarCPF(e.target.value));
        }
    });
</script>
{% endblock %}
