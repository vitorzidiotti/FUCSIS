<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Sistema{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header-nav">
    {% if back_url %}
        <a href="{{ back_url }}" class="btn btn-yellow">‹ Voltar</a>
    {% else %}
        <a href="javascript:history.back()" class="btn btn-yellow">‹ Voltar</a>
    {% endif %}
    
    <a href="{{ url_for('auth.logout') }}" class="btn btn-red">Sair</a>
</header>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Delegação de evento para formulários de exclusão
            document.body.addEventListener('submit', function(event) {
                if (event.target.matches('.delete-form')) {
                    event.preventDefault();
                    const form = event.target;
                    
                    Swal.fire({
                        title: 'Tem certeza?',
                        text: "Esta ação não poderá ser desfeita!",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#dc3545',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Sim, excluir!',
                        cancelButtonText: 'Cancelar'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            form.submit();
                        }
                    });
                }
            });
        });
    </script>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const Toast = Swal.mixin({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 4000,
                        timerProgressBar: true
                    });

                    {% for category, message in messages %}
                        Toast.fire({
                            // Mapeia suas categorias do Python para os ícones do SweetAlert
                            icon: '{{ "success" if category == "sucesso" else "error" if category == "erro" else "info" }}',
                            title: '{{ message }}'
                        });
                    {% endfor %}
                });
            </script>
        {% endif %}
    {% endwith %}

    {% block scripts %}{% endblock %}
</body>
</html>
